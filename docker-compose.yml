services:
  postgres:
    image: postgres:15
    container_name: soc-postgres
    restart: always
    environment:
      POSTGRES_DB: soc
      POSTGRES_USER: soc
      POSTGRES_PASSWORD: soc
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: soc-minio
    command: server /data --console-address ":9001"
    restart: always
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soc-backend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - minio
    env_file:
      - .env

  frontend:
    build:
      context: ../social-frontend
      dockerfile: Dockerfile
    container_name: soc-frontend
    restart: always
    ports:
      - "3001:3000"
    depends_on:
      - backend
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:3000
      - NEXT_PUBLIC_SOCKET_URL=http://backend:3000
      - NEXT_PUBLIC_MINIO_ENDPOINT=minio
      - NEXT_PUBLIC_MINIO_PORT=9000
      - NEXT_PUBLIC_MINIO_BUCKET=social

  pgadmin:
    image: dpage/pgadmin4
    container_name: soc-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@gmail.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5051:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      
volumes:
  pgdata:
  minio_data:
  pgadmin_data: