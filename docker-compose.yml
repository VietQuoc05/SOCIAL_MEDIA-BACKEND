services:
  postgres:
    image: postgres:15
    container_name: soc-postgres
    restart: always
    environment:
      POSTGRES_DB: soc
      POSTGRES_USER: soc
      POSTGRES_PASSWORD: soc
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio
    container_name: soc-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: soc-backend
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - postgres
      - minio
    env_file:
      - .env

volumes:
  pgdata:
  minio_data: